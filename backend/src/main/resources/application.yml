spring:
  application:
    name: codeslam-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/codeslam?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:12345}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
clerk:
  jwks-url: ${CLERK_JWKS_URL:https://your-clerk-domain/.well-known/jwks.json}
  webhook-secret: ${CLERK_WEBHOOK_SECRET:}
auth:
  jwt:
    issuer: ${AUTH_JWT_ISSUER:codeslam-auth}
    secret-base64: Y29kZXNsYW0tc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtMTIzNDU2Nzg5
    expiration-minutes: ${AUTH_JWT_EXPIRATION_MINUTES:15}
    refresh-expiration-days: ${AUTH_JWT_REFRESH_EXPIRATION_DAYS:30}
    cleanup-interval-ms: ${AUTH_JWT_CLEANUP_INTERVAL_MS:3600000}
  password-reset:
    expiration-minutes: ${AUTH_PASSWORD_RESET_EXPIRATION_MINUTES:30}
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    routes:
      - name: login
        path: /api/auth/login
        methods: [POST]
        capacity: ${RATE_LIMIT_LOGIN_CAPACITY:8}
        refill-tokens: ${RATE_LIMIT_LOGIN_REFILL_TOKENS:8}
        refill-period: ${RATE_LIMIT_LOGIN_REFILL_PERIOD:PT1M}
      - name: register
        path: /api/auth/register
        methods: [POST]
        capacity: ${RATE_LIMIT_REGISTER_CAPACITY:4}
        refill-tokens: ${RATE_LIMIT_REGISTER_REFILL_TOKENS:4}
        refill-period: ${RATE_LIMIT_REGISTER_REFILL_PERIOD:PT10M}
      - name: matchmaking-join
        path: /api/queue/join
        methods: [POST]
        capacity: ${RATE_LIMIT_MATCHMAKING_JOIN_CAPACITY:12}
        refill-tokens: ${RATE_LIMIT_MATCHMAKING_JOIN_REFILL_TOKENS:12}
        refill-period: ${RATE_LIMIT_MATCHMAKING_JOIN_REFILL_PERIOD:PT1M}
      - name: matchmaking-join-alias
        path: /api/matchmaking/join
        methods: [POST]
        capacity: ${RATE_LIMIT_MATCHMAKING_JOIN_CAPACITY:12}
        refill-tokens: ${RATE_LIMIT_MATCHMAKING_JOIN_REFILL_TOKENS:12}
        refill-period: ${RATE_LIMIT_MATCHMAKING_JOIN_REFILL_PERIOD:PT1M}
      - name: submission
        path: /api/submissions/**
        methods: [POST]
        capacity: ${RATE_LIMIT_SUBMISSION_CAPACITY:30}
        refill-tokens: ${RATE_LIMIT_SUBMISSION_REFILL_TOKENS:30}
        refill-period: ${RATE_LIMIT_SUBMISSION_REFILL_PERIOD:PT1M}
      - name: submission-alias
        path: /api/submission/**
        methods: [POST]
        capacity: ${RATE_LIMIT_SUBMISSION_CAPACITY:30}
        refill-tokens: ${RATE_LIMIT_SUBMISSION_REFILL_TOKENS:30}
        refill-period: ${RATE_LIMIT_SUBMISSION_REFILL_PERIOD:PT1M}
      - name: webhook
        path: /api/webhooks/**
        methods: [POST]
        capacity: ${RATE_LIMIT_WEBHOOK_CAPACITY:60}
        refill-tokens: ${RATE_LIMIT_WEBHOOK_REFILL_TOKENS:60}
        refill-period: ${RATE_LIMIT_WEBHOOK_REFILL_PERIOD:PT1M}
    login:
      block-after-failures: ${LOGIN_BLOCK_AFTER_FAILURES:5}
      base-delay: ${LOGIN_BASE_DELAY:PT2S}
      max-delay: ${LOGIN_MAX_DELAY:PT2M}
      block-duration: ${LOGIN_BLOCK_DURATION:PT15M}
    cleanup:
      stale-after: ${RATE_LIMIT_STALE_AFTER:PT6H}
      max-entries: ${RATE_LIMIT_MAX_ENTRIES:20000}
server:
  port: 8080
  forward-headers-strategy: framework
judge0:
  url: ${JUDGE0_URL:https://ce.judge0.com}
  api-key: ${JUDGE0_API_KEY:}
  timeout-ms: ${JUDGE0_TIMEOUT_MS:12000}
submission:
  worker:
    threads: 10
